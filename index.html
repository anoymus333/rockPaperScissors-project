<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
<p class="title">Rock Paper Scissors</p>
    <button onclick="playgame('rock')"> <img src="rock.jpeg" width="100px" height="100px" class="custom">
        
    </button>

    <button onclick="playgame('paper')"><img src="paper.jpeg" width="100px" height="100px" class="custom">
        
    </button>

    <button onclick="playgame('scissors')"><img src="scissors.jpeg" width="100px" height="100px" class="custom">
        
    </button>
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>
 <button onclick="
 score.win = 0;
 score.loose=0;
 score.tie=0;
 localStorage.removeItem('score');
 updateScore();
 " class="resetbutton">reset</button>
    <script>
       
    let score = JSON.parse(localStorage.getItem('score')) || {
        win: 0,
        loose: 0,
        tie: 0
    };

    function updateScore() {
        document.querySelector('.js-score').innerHTML = 
            `win:${score.win} looses:${score.loose} tie:${score.tie}`;
    }

    /*
       if(!score)
       {
           score = {
               win: 0,
               loose: 0,
               tie: 0
           };
       }
    */

        function playgame(playermove) {

            const ComputerMove = PickComputerMove();
            let result = '';

            if (playermove === 'rock') {

                if (ComputerMove === 'rock') {
                    result = 'tie';
                }
                else if (ComputerMove === 'paper') {
                    result = 'lose';
                }
                else if (ComputerMove === 'scissors') {
                    result = 'win';
                }

            }

            else if (playermove === 'paper') {

                if (ComputerMove === 'rock') {
                    result = 'win';
                }
                else if (ComputerMove === 'paper') {
                    result = 'tie';
                }
                else if (ComputerMove === 'scissors') {
                    result = 'lose';
                }

            }

            else if (playermove === 'scissors') {

                if (ComputerMove === 'rock') {
                    result = 'lose';
                }
                else if (ComputerMove === 'paper') {
                    result = 'win';
                }
                else if (ComputerMove === 'scissors') {
                    result = 'tie';
                }

            }
if(result=== 'win'){
    score.win +=1;
}
else if(result=== 'lose')
{
    score.loose +=1;
}

else if(result === 'tie')
{
    score.tie +=1;
}
localStorage.setItem('score',JSON.stringify(score));
updateScore();
document.querySelector('.js-result').innerHTML = `You ${result}`;
document.querySelector('.js-moves').innerHTML = `You ${playermove} /  Computer ${ComputerMove}`;
            
}
        

        function PickComputerMove() {

            const Random = Math.random();
            let ComputerMove = '';

            if (Random >= 0 && Random < 1 / 3) {
                ComputerMove = 'rock';
            }
            else if (Random >= 1 / 3 && Random < 2 / 3) {
                ComputerMove = 'paper';
            }
            else {
                ComputerMove = 'scissors';
            }

            return ComputerMove;
        }

    </script>
<style>
    body{
        background-color: black;
        color: white;
        font-family: Arial;
        
    }
    .title{
        font-size: 30px;
        font-weight: bold;
    }
    .custom{
        border-radius: 50px;
       border: 1px solid white;
        background-color : transparent;
    }
    .resetbutton{
        background-color: transparent;
        border: 1px solid white;
        padding: 10px 20px;
        border-radius: 25px;
        cursor: pointer;
        color: white;
        font-size: 20px;
        font-weight: bold;
        transition: all 0.3s ease;
    }
    .resetbutton:hover{
        background-color: white;
        color: black;
    }
</style>
</body>
</html>
